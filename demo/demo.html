<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Demo Reel</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; color:#111; font-family:-apple-system,system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:10px; padding:16px 28px; }
  h1 { font-size:15px; font-weight:600; margin-right:auto; }
  button, label.btn { padding:7px 16px; border-radius:8px; border:1px solid #ddd; background:#fff;
           font-size:13px; cursor:pointer; color:#111; }
  button:hover, label.btn:hover { border-color:#111; }
  .primary { background:#111; border-color:#111; color:#fff; }
  input[type=file] { display:none; }
  .ts { width:86px; padding:7px 10px; border:1px solid #ddd; border-radius:8px; font-size:13px; }
  .ts:focus { outline:none; border-color:#111; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(400px,1fr)); gap:16px; padding:8px 28px 40px; }
  .card { border:1px solid #eee; border-radius:12px; overflow:hidden; }
  .card.playing { border-color:#111; }
  video { width:100%; aspect-ratio:16/9; background:#000; display:block; }
  .row { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; }
  .name { font-size:12px; color:#555; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .drop { margin:8px 28px; border:1.5px dashed #ddd; border-radius:12px; padding:40px;
          text-align:center; color:#999; font-size:13px; }
  .drop.over { border-color:#111; color:#111; }
  .audiobox { display:flex; align-items:center; justify-content:center; background:#fafafa; aspect-ratio:16/5; }
  .audiobox audio { width:90%; }
</style>
</head>
<body>

<header>
  <h1>Demo Reel</h1>
  <label class="btn">Upload<input type="file" accept="video/*,audio/*" multiple onchange="add(this.files)"></label>
  <input class="ts" id="t0" placeholder="from 0:00">
  <input class="ts" id="t1" placeholder="to end">
  <button class="primary" onclick="playAll()">Play all</button>
  <button onclick="playSeq()">One by one</button>
  <button onclick="stopAll()">Stop</button>
</header>

<div class="drop" id="drop">drop videos or audio here</div>
<div class="grid" id="grid"></div>

<script>
const vids = [];
const grid = document.getElementById('grid');
const drop = document.getElementById('drop');

function add(files) {
  for (const f of files) {
    const i = vids.length;
    const isAudio = f.type.startsWith('audio');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = (isAudio
      ? `<div class="audiobox"><audio src="${URL.createObjectURL(f)}" controls preload="metadata"></audio></div>`
      : `<video src="${URL.createObjectURL(f)}" controls preload="metadata"></video>`) +
      `<div class="row"><div class="name">${f.name}</div><button onclick="playOne(${i})">Play</button></div>`;
    grid.appendChild(card);
    const v = card.querySelector(isAudio ? 'audio' : 'video');
    v.onplay = () => card.classList.add('playing');
    v.onpause = v.onended = () => card.classList.remove('playing');
    vids.push(v);
  }
  drop.style.display = vids.length ? 'none' : '';
}

drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = (e) => { e.preventDefault(); drop.classList.remove('over'); add(e.dataTransfer.files); };
document.body.ondragover = (e) => e.preventDefault();
document.body.ondrop = (e) => { e.preventDefault(); add(e.dataTransfer.files); };

// "1:23" | "83" | "1:02:03" -> seconds (null if empty/invalid)
function parseTs(id) {
  const s = document.getElementById(id).value.trim();
  if (!s) return null;
  const parts = s.split(':').map(Number);
  if (parts.some(isNaN)) return null;
  return parts.reduce((a, b) => a * 60 + b, 0);
}
const range = () => ({ from: parseTs('t0') ?? 0, to: parseTs('t1') });

function startClipped(v, { from, to }, onDone) {
  v.currentTime = from;
  v.ontimeupdate = to != null ? () => {
    if (v.currentTime >= to) { v.pause(); v.ontimeupdate = null; onDone && onDone(); }
  } : null;
  v.onended = () => { v.ontimeupdate = null; onDone && onDone(); };
  v.play();
}

const stopAll = () => vids.forEach(v => { v.onended = v.ontimeupdate = null; v.pause(); v.currentTime = 0; });
const playOne = (i) => { vids.forEach((v, j) => j !== i && v.pause()); startClipped(vids[i], range()); };
const playAll = () => { const r = range(); vids.forEach(v => startClipped(v, r)); };
function playSeq() {
  stopAll();
  const r = range();
  let i = 0;
  const next = () => {
    if (i >= vids.length) return;
    vids[i].scrollIntoView({ behavior:'smooth', block:'center' });
    startClipped(vids[i], r, () => { i++; next(); });
  };
  next();
}
</script>
</body>
</html>
